<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temples</title>
    <meta name="description" content="Take a look of different temples of the Church of Jesuschrist of Latter-Day Saints!">
    <meta name="author" content="Arlette Steele">
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script src="scripts/temples.js" defer></script>
    <script src="scripts/getdates.js" defer></script>
</head>
<body>
    <header>
        <h1>Temple Album</h1>
        <button class="hamburger" id="hamburger-btn">&#9776;</button>
        <nav>
            <ul id="nav-menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Home</h2>
        <div class="images">
            <figure>
                <img src="images/arequipa-peru-temple.jpeg" alt="Arequipa Peru Temple" width="250">
                <figcaption>Arequipa Peru</figcaption>
            </figure>
            <figure>
                <img src="images/Asuncion-paraguay-temple.jpeg" alt="Asuncion Paraguay Temple" width="250">
                <figcaption>Asuncion Paraguay</figcaption>
            </figure>
            <figure>
                <img src="images/bern-switzerland-temple.jpg" alt="Bern Switzerland Temple" width="250">
                <figcaption>Bern Switzerland Temple</figcaption>
            </figure>
            <figure>
                <img src="images/buenos-aires-argentina-temple.jpg" alt="Buenos Aires Argentina Temple" width="250">
                <figcaption>Buenos Aires Argentina</figcaption>
            </figure>
            <figure>
                <img src="images/Chicago-Temple.jpg" alt="Ilinois Chicago Temple" width="250">
                <figcaption>Ilinois Chicago</figcaption>
            </figure>
            <figure>
                <img src="images/fort-collins-colorado-temple.jpg" alt="Fort Collins Colorado Temple" width="250">
                <figcaption>Fort-Collins Colorado</figcaption>
            </figure>
            <figure>
                <img src="images/Fort-Lauderdale-Temple.jpg" alt="Fort Lauderdale Temple" width="250">
                <figcaption>Fort-Lauderdale Florida</figcaption>
            </figure>
            <figure>
                <img src="images/mount-timpanogos-temple.jpg" alt="Mount Timpanogos Temple" width="250">
                <figcaption>Mount Timpanogos Utah</figcaption>
            </figure>
            <figure>
                <img src="images/Provo-City-Temple.jpg" alt="Provo City Temple" width="250">
                <figcaption>Provo City Utah</figcaption>
            </figure>
        </div>
    </main>
    <footer>
        <span id="currentyear"></span>
        <p>Arlette Steele | San Antonio, Texas</p>
        <p id="copyright"></p>
        <p id="lastModified"></p>
    </footer> 
</body>
</html>
