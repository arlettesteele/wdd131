<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <meta name="author" content="Arlette Steele">
    <meta name="description" content="This page will help you download the app. Wether you have Windows, Mac, or a mobile device like Android or iOS, we've got you covered. Simply select your platform below to get started and enjoy the convenience of Tasky at your fingertips!">
    <link rel="stylesheet" href="styles/contact.css">
    <script src="script/home-page.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <section class="title">
            <img src="images/tasky-logo.png" width="100">
            <h1>Tasky!</h1>
        </section>
        <section class="nav-menu">
            <a href="home-page.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="download.html">Download the App</a>
            <a href="contact.html">Contact Us</a>
        </section>
    </header>
    <main>
        <h1>Talk with our team</h1>
        <p>If you have any questions, please fill out the form below:</p>
        <form>
            <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn">Send My Email</button>
        </form>
    </main>
    <footer>
        <nav class="links">
            <a href="https://www.instagram.com/">
                <img src="images/instagram.png" alt="Instagram" width="40">
            </a>
            <a href="https://www.facebook.com/">
                <img src="images/facebook.png" alt="Facebook" width="40">
            </a>
            <a href="https://x.com/">
                <img src="images/twitter.png" alt="Twitter" width="40">
            </a>
        </nav>
        <div class="content">
            <span id="currentyear"></span>
            <p>Tasky! | 🌊 Arlette Steele 🌊 | San Antonio, Texas</p>
            <span id="copyright"></span>
        </div>
    </footer> 
</body>
</html>
