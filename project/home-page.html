<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page Tasky!</title>
    <meta name="author" content="Arlette Steele">
    <meta name="description" content="Tasky! connects you with skilled professionals for any task, from cleaning and repairs to design and tutoring. Browse services, negotiate prices, and hire with confidence.">
    <link rel="stylesheet" href="styles/home-page.css">
    <script src="script/home-page.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <section class="title">
            <img src="images/tasky-logo.png" width="100">
            <h1>Tasky!</h1>
        </section>
        <section class="nav-menu">
            <a href="home-page.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="download.html">Download the App</a>
            <a href="contact.html">Contact Us</a>
        </section>
    </header>
    <main>
        <section class="image">
            <img src="images/landscape.jpg">
            <form method="get" action="download.html">
                <input type="submit" value="Press here to download the app">
            </form>
        </section>
        <h2>You can find the following services:</h2>
        <section class="services">
            <picture>
                <img src="images/cleaning.jpeg" alt="cleaning image" width="200">
                <figcaption>Cleaning</figcaption>
            </picture>
            <picture>
                <img src="images/plumbing.jpg" alt="plumbing image" width="200">
                <figcaption>Plumbing</figcaption>
            </picture>
            <picture>
                <img src="images/electricist.jpg" alt="electricist image" width="200">
                <figcaption>Electrical</figcaption>
            </picture>
            <picture>
                <img src="images/babysitting.jpg" alt="babysitting image" width="200">
                <figcaption>Babysitting</figcaption>
            </picture>
            <picture>
                <img src="images/garden.jpg" alt="Yard maintance image" width="200">
                <figcaption>Yard Maintance and Gardering</figcaption>
            </picture>
            <picture>
                <img src="images/home.jpg" alt="home image" width="200">
                <figcaption>Home Repairs</figcaption>
            </picture>
        </section>
        <h3>And more. Just ask the provider!</h3>
    </main>
    <footer>
        <nav class="links">
            <a href="https://www.instagram.com/">
                <img src="images/instagram.png" alt="Instagram" width="40">
            </a>
            <a href="https://www.facebook.com/">
                <img src="images/facebook.png" alt="Facebook" width="40">
            </a>
            <a href="https://x.com/">
                <img src="images/twitter.png" alt="Twitter" width="40">
            </a>
        </nav>
        <div class="content">
            <span id="currentyear"></span>
            <p>Tasky! | 🌊 Arlette Steele 🌊 | San Antonio, Texas</p>
            <span id="copyright"></span>
        </div>
    </footer>    
</body>
</html>
