<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Page</title>
    <meta name="author" content="Arlette Steele">
    <meta name="description" content="Review our product! This can help us improve your experience">
    <script src="scripts/form.js" defer></script>
    <script src="scripts/getdates.js" defer></script>
    <link rel="stylesheet" href="styles/form.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <fieldset>
                <label for="product">Product Name</label>
                <select name="product" id="product" required>
                    <option value="">Please Select a Product</option>
                </select> 

                <p>Overall Rating</p>

                <div class="overall-rating">
                <label> ☆ <input type="radio" name="rating" value="one" required></label>
                <label> ☆☆ <input type="radio" name="rating" value="two" required></label>
                <label> ☆☆☆ <input type="radio" name="rating" value="three" required></label>
                <label> ☆☆☆☆ <input type="radio" name="rating" value="four" required></label>
                <label>☆☆☆☆☆<input type="radio" name="rating" value="five" required></label>
                </div>

                <label for="product-date">Date of Installation</label> 
                <input type="date" id="Date" name="service-date" required>

                <p>What features did you find useful in the product? (Check all that apply)</p>
                <label><input type="checkbox" name="durability" value="yes">Durability</label>
                <label><input type="checkbox" name="use" value="yes">Ease of Use</label>
                <label><input type="checkbox" name="performance" value="yes">Performance</label>
                <label><input type="checkbox" name="design" value="yes">Design</label>

                <label for="review">Written Review (Optional)<textarea id="review" name="review" placeholder="Type your message here..."></textarea></label>

                <label for="fname">Your Name (Optional)<input type="text" name="fname"></label>

                <input type="submit" value="Send My Review">
            </fieldset>
        </form>
    </main>
    <footer>
        <span id="currentyear"></span>
        <p>🌊 Arlette Steele 🌊 | San Antonio, Texas</p>
        <p id="copyright"></p>
        <p id="lastModified"></p>
    </footer> 
</body>
</html>
